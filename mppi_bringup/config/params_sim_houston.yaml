lmppi_node:
  ros__parameters:
    # Sim profile of params_houston_main.yaml. Differences vs hardware:
    #   is_sim: true             -> /ego_racecar/odom (sim publishes ~240 Hz)
    #   use_pose_delta_state_estimate: false  -> sim odom twist is clean
    # Everything else mirrors hardware so timing-gap behavior is comparable.

    is_sim: false                  # true: /ego_racecar/odom; false: /pf/pose/odom.
    state_predictor: dynamic_ST
    n_samples: 2048
    n_steps: 8
    sim_time_step: 0.1
    random_seed: 527787
    render: false                 # debug-disabled mode for timing-gap diagnosis

    # timer
    control_loop_hz: 40.0

    # Control trigger architecture (NEW). 'odom_gate': pose_callback rate-
    # gates and dispatches control_step (~30 Hz from a 50 Hz pose source),
    # so the SingleThreadedExecutor cannot starve pose ingestion behind a
    # continuously-ready timer. control_loop_timer becomes a low-rate
    # watchdog that only fires if pose-driven dispatch hasn't run in
    # control_watchdog_max_silence_sec. 'timer' is the legacy fixed-rate
    # behavior (one-flag rollback). control_trigger_mode is read-only at
    # startup; restart node to switch.
    control_trigger_mode: timer              # 'odom_gate' | 'timer'
    control_watchdog_hz: 5.0                     # watchdog timer rate in odom_gate mode
    control_watchdog_max_silence_sec: 0.10       # fire watchdog if pose-driven hasn't run in this long

    # Live param refresh gate. OFF for race day so the 2 Hz refresh timer
    # only reads a single bool per tick (essentially free) instead of
    # ~100 params. Flip true via `ros2 param set lmppi_node live_tuning_enabled true`
    # for tuning sessions; flip back to false before racing.
    live_tuning_enabled: false


    # Live tuning parameters
    temperature: 0.01
    init_vel: 2.1
    startup_speed: 1.0
    use_pose_delta_state_estimate: false   # sim has clean twist
    friction: 0.5

    use_waypoint_speed_profile: true
    speed_profile_scale: 1.2
    speed_profile_min_speed: 2.0
    speed_profile_max_speed: 11.0
    speed_profile_lookahead_steps: 3
    speed_profile_iterations: 3

    use_speed_profile_drive_speed: false
    speed_profile_drive_lookahead_steps: 0

    control_sample_std_steer: 0.8
    control_sample_std_accel: 10.0
    steer_vel_scale: 3.0
    accel_scale: 4.0

    ######################################################
    ################### Reward weights ###################
    ######################################################
    xy_reward_weight: 0.25
    velocity_reward_weight: 0.15
    yaw_reward_weight: 0.01

    wall_cost_enabled: false
    wall_cost_weight: 30.0
    wall_cost_margin: 0.13
    wall_cost_power: 0.5
    wall_cost_map_yaml: '' # injected by launch

    opponent_path_topic: /opponent/predicted_path
    opponent_cost_enabled: true
    opponent_cost_weight: 100.0
    opponent_cost_radius: 0.6
    opponent_cost_power: 2.0
    opponent_cost_discount: 1.0
    opponent_path_timeout: 0.5
    opponent_behavior_mode: clear
    opponent_follow_weight: 8.0
    opponent_follow_distance: 1.2
    opponent_same_lane_width: 0.7
    opponent_pass_weight: 12.0
    opponent_pass_lateral_offset: 0.55
    opponent_pass_longitudinal_window: 1.5
    opponent_auto_wall_check_enabled: true
    opponent_auto_min_wall_clearance: 0.45
    opponent_auto_check_steps: 3
    opponent_auto_min_closing_speed: 0.4
    opponent_auto_max_ahead_distance: 4.0
    opponent_auto_side_switch_margin: 0.08

    slip_cost_enabled: false
    slip_cost_weight: 2.0
    slip_cost_beta_safe: 0.4

    latacc_cost_enabled: false
    latacc_cost_weight: 3.0
    latacc_cost_safe: 80.0

    steer_sat_cost_enabled: false
    steer_sat_cost_weight: 0.5
    steer_sat_soft_ratio: 0.85

    mppi_guard_on_timing_jump: true
    mppi_guard_wall_gap: 0.3
    mppi_guard_stamp_gap: 0.3
    mppi_guard_aopt_threshold: 0.98
    mppi_guard_saturation_callbacks: 4
    mppi_guard_bad_callbacks_to_clear_control: 3

    state_est_vy_prior: 0.4
    state_est_wz_prior: 0.4
    state_est_hiccup_dt: 0.06
    state_est_hiccup_prior_scale: 0.35

    # /scan-based forward-cone speed cap. Reactive backstop for static
    # obstacles (independent of any opp detection). Race default OFF —
    # appeared to add tick latency in the last test (might also have been
    # the low battery / lidar PLL drift). Flip to true via
    # `ros2 param set` if you want it active without restarting.
    scan_safety_enabled: false
    scan_safety_cone_half_rad: 0.45    # ±~26° forward cone
    scan_safety_brake_dist: 0.6        # below this clearance, cap = scan_safety_min_speed
    scan_safety_warn_dist: 2.0         # above this clearance, no cap
    scan_safety_min_speed: 0.5         # m/s when fully braked. 0 = full stop.
    scan_safety_min_range: 0.10        # ignore returns closer than this

    # In-process opponent detector (writes opponent_xy_horizon directly,
    # bypasses the standalone opp launch). Race default OFF — opponent
    # cost machinery below stays armed but is fed nothing, so it does
    # nothing unless inproc is flipped on or the network detector
    # publishes. Do NOT enable both inproc and the standalone opp launch
    # at the same time (last-writer-wins on opponent_xy_horizon).
    inproc_opp_enabled: false
    inproc_opp_max_range: 5.0          # m
    inproc_opp_min_range: 0.30         # m
    inproc_opp_cone_half_rad: 1.05     # ~60° forward half-cone
    inproc_opp_min_cluster_pts: 4      # min consecutive beams to call it an obstacle
    inproc_opp_max_cluster_width: 1.20 # m, drops walls
    inproc_opp_wall_skip_dist: 0.25    # m, SDF filter; 0 disables
    inproc_opp_min_run_interval_sec: 0.08  # ~12 Hz throttle

    ######################################################
    ###################### BACKEND #######################
    ######################################################
    min_speed: 0.0
    max_speed: 12.0
    max_steering_angle: 0.4189

    # Visualization OFF — this profile is the "no debug" leg of the A/B
    # diagnostic. To re-enable for visual debugging, flip publish_markers
    # to true and bump sampled_trajectory_count.
    publish_markers: false
    marker_frame_id: map
    reference_line_width: 0.06
    optimal_line_width: 0.08
    sampled_line_width: 0.025
    sampled_trajectory_count: 0
    sampled_trajectory_alpha: 0.18
