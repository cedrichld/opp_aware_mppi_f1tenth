opponent_predictor:
  ros__parameters:
    input_odom_topic: /opp_racecar/odom
    estimated_odom_topic: /opponent/odom
    predicted_path_topic: /opponent/predicted_path
    marker_topic: /opponent/markers
    debug_topic: /opponent/debug

    # Relative paths are resolved from the mppi_bringup package share.
    waypoint_path: waypoints/lev_testing/lev_blocked.csv
    waypoint_path_absolute: false
    frame_id: map
    pose_source: odom_pose
    tf_lookup_timeout: 0.02

    prediction_steps: 5
    prediction_dt: 0.1
    publish_rate_hz: 20.0

    speed_profile_scale: 1.0
    speed_profile_min_speed: 0.0
    speed_profile_max_speed: 20.0
    profile_speed_blend: 0.2
    out_of_sight_profile_speed_blend: 1.0

    lateral_offset_alpha: 0.35
    lateral_offset_decay_time: 0.3
    position_snap_alpha: 1.0

    initial_speed: 1.0
    stale_timeout: 0.5
    max_stale_prediction_time: 2.0
    max_progress_speed: 12.0
    max_progress_accel: 8.0

    kf_process_var_s: 0.05
    kf_process_var_v: 0.5
    kf_measurement_var_s: 0.15
    kf_measurement_var_v: 0.6
